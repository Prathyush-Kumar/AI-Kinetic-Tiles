<!DOCTYPE html>
<html>
<head>
  <title>Live Energy Data</title>
  <style>
    body {
      background: #111;
      color: #0f0;
      font-family: Arial;
      text-align: center;
    }
  </style>
</head>
<body>

  <h1>Live Energy Harvesting Data</h1>
  <h2 id="voltage">Waiting...</h2>

  <script>
    const esp32IP = "http://192.168.1.5"; // CHANGE THIS

    async function fetchData() {
      try {
        const response = await fetch(esp32IP + "/data");
        const data = await response.json();
        document.getElementById("voltage").innerText =
          "Voltage: " + data.voltage + " V";
      } catch (error) {
        document.getElementById("voltage").innerText =
          "ESP32 not reachable";
      }
    }

    setInterval(fetchData, 2000);
  </script>

</body>
</html>
